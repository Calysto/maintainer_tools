name: Build and Inspect Package
description: Build and inspect the Python package, exporting supported Python versions

inputs:
  include-free-threaded:
    required: false
    default: "true"
    description: "Whether to include free-threaded Python builds"

outputs:
  python-versions:
    description: "JSON array of supported Python versions derived from classifiers"
    value: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}

runs:
  using: composite
  steps:
    - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df  # v2.18.0
      id: baipp
      with:
        include-free-threaded: ${{ inputs.include-free-threaded }}
